set -g mouse on

set -g default-terminal "tmux-256color"

# Based on official brand colors

# Status bar
set -g status-style bg=#121212,fg=#FFFFFF
set -g status-left-style bg=#3C5DFF,fg=#FFFFFF,bold
set -g status-right-style bg=#121212,fg=#A0A0C0

# Window tabs
set -g window-status-style bg=#121212,fg=#A0A0C0
set -g window-status-current-style bg=#3C5DFF,fg=#FFFFFF,bold
set -g window-status-activity-style fg=#3C5DFF

# Panes
set -g pane-border-style bg=#121212,fg=#5A697B
set -g pane-active-border-style bg=#121212,fg=#3C5DFF

# Messages
set -g message-style bg=#3C5DFF,fg=#FFFFFF
set -g message-command-style bg=#121212,fg=#3C5DFF

# Mode (copy mode) – this sets the selection highlight
set -g mode-style bg=colour27,fg=colour255

# Status bar content
#set -g status-left "#[bg=#3C5DFF,fg=#FFFFFF] #S #[bg=#121212,fg=#3C5DFF]"
#set -g status-right "#[bg=#121212,fg=#A0A0C0] %H:%M #[bg=#121212,fg=#3C5DFF]#[bg=#3C5DFF,fg=#FFFFFF] #(whoami) "
set -g status-left "#[bg=#008b8b,fg=#FFFFFF] #S #[bg=#121212,fg=#008b8b]"
set -g status-right "#[bg=#121212,fg=#A0A0C0] %H:%M #[bg=#121212,fg=#008b8b]#[bg=#008b8b,fg=#FFFFFF] #(whoami) "
# Split panes in same dir
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# New window in same dir
bind c new-window -c "#{pane_current_path}"

# vim keybindings in copy mode
set-window-option -g mode-keys vi

# vim keybindings for pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vim history limit
set -g history-limit 10000

# Disable automatic renaming of windows
set -g allow-rename off
